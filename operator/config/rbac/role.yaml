---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: queueworker-operator-role
rules:
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - serverless-poc.sk-santhosh.io
  resources:
  - queueworkers
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - serverless-poc.sk-santhosh.io
  resources:
  - queueworkers/status
  verbs:
  - get
  - patch
  - update
