apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "queueworker-operator.fullname" . }}
  labels:
    {{- include "queueworker-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "queueworker-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "queueworker-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "queueworker-operator.fullname" . }}
      securityContext:
        runAsNonRoot: true
        # gcr.io/distroless/static:nonroot's built-in numeric UID/GID.
        # Explicit here (rather than relying on the image default) so the
        # kubelet never has to fall back to inspecting the image's USER
        # metadata to verify non-root.
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
