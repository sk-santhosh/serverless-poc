# Real SMTP credentials must never be committed. Override the `smtp.*`
# values in this Secret via `--set` or an untracked, gitignored
# `values-secrets.yaml` passed with `-f` at install/upgrade time — see the
# comments above the `smtp:` block in values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: smtp-credentials
  labels:
    {{- include "queueworker-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  SMTP_HOST: {{ .Values.smtp.host | quote }}
  SMTP_PORT: {{ .Values.smtp.port | quote }}
  SMTP_USER: {{ .Values.smtp.user | quote }}
  SMTP_PASS: {{ .Values.smtp.pass | quote }}
  FROM_EMAIL: {{ .Values.smtp.fromEmail | quote }}
