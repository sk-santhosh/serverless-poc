apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webapp.fullname" . }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "webapp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "webapp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        # Explicit numeric UID/GID (matches the Dockerfile's `nextjs` user,
        # uid/gid 1001). Required because the kubelet cannot verify a
        # non-numeric image USER (e.g. "nextjs") against runAsNonRoot on
        # its own — without this it fails with "cannot verify user is
        # non-root".
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
          env:
            # Next.js's standalone server.js binds to $HOSTNAME if set,
            # defaulting to 0.0.0.0 only when unset. Kubernetes (via the
            # container runtime) auto-sets HOSTNAME to the pod name, and
            # the pod's /etc/hosts maps that name to the pod's real IP —
            # not loopback — so without this override the server binds
            # only to the pod IP. Service/kube-proxy traffic and probes
            # (which target the pod IP directly) still work, but anything
            # connecting via localhost inside the netns (e.g. `kubectl
            # port-forward`) gets "connection refused".
            - name: HOSTNAME
              value: "0.0.0.0"
            {{- if .Values.otel.exporterEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "webapp.fullname" . }}-redis-env
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
